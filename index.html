<!DOCTYPE html>
<html lang="es">
<!-- autor @Marcoev -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taks</title>
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/@tailwindcss/forms@0.5.3/dist/browser.min.css" rel="stylesheet">
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://unpkg.com/flowbite@latest/dist/flowbite.min.js"></script>
    <!-- css toast -->
    <link rel="stylesheet" href="./css/keyFramesToast.css">
</head>

<body class="bg-gray-900">
    <header class="header flex w-full h-auto space-between p-4 border-b border-gray-700 gap-4 justify-end">
        <!-- logo -->
        <div class="flex-grow">
            <a href="index.html" class="text-yellow-300 font-bold font-mono text-3xl">Task´s</a>
        </div>
        <!-- pres tecla f2 (desktop)-->
        <button id="tecla-f2"
            class="lg:block md:block hidden btn text-gray-100 cursor-pointer border rounded-md py-2 px-2 opacity-50 hover:opacity-100"
            title="press F2">F2
        </button>
        <!-- pres tecla f2 (movil)-->
        <button id="enter-f2"
            class="md:hidden lg-hidden btn text-gray-100 cursor-pointer border border-indigo-600 rounded-md py-2 px-2 hover:bg-indigo-600 hover:text-gray-100 transition delay-100 duration-200 ease-out hover:translate-y-2 hover:scale-110 "
            title="New Tarea"><i class="fas fa-solid fa-clipboard-list"></i>
        </button>
        <!-- clear() caché -->
        <button id="btn-clear"
            class="btn text-red-500 cursor-pointer border border-red-500 rounded-md py-2 px-2 hover:bg-red-500 hover:text-gray-900 transition delay-100 duration-200 ease-out hover:translate-y-2 hover:scale-110 "
            title="Delete Caché"><i class="fa fa-solid fa-trash"></i></button>
        <!-- refresh -->
        <button
            class="btn text-yellow-300 cursor-pointer border border-yellow-300 rounded-md py-2 px-2 hover:bg-yellow-300 hover:text-gray-900 transition delay-100 duration-200 ease-out hover:translate-y-2 hover:scale-120 "
            title="Refresh Page" onclick="location.reload()"><i class="fa fa-solid fa-rotate"></i></button>
        <!-- GitHub code -->
        <a href="https:github.com/MarkoEv/tasksmanager.git"
            class="btn text-gray-300 cursor-pointer border border-gray-300 rounded-md py-2 px-2 hover:bg-gray-300 hover:text-gray-900 transition delay-100 duration-200 ease-out hover:translate-y-2 hover:scale-120 "
            title="Code" target="_blank"><i class="fa-solid fa-code text-lg"></i>
        </a>
    </header>
    <main class="text-white px-4">
        <form class="form py-4 w-full grid" id="task-form">
            <div class="py-2">
                <label for="task-input" class="opacity-70">¿Qué vas a comprar hoy?</label>
            </div>
            <div class="flex gap-1">
                <input type="text"
                    class="border border-gray-600 rounded-sm focus-yellow-100 py-2 px-2 text-white-300 flex-grow"
                    id="task-input" placeholder="Escribe aquí..." required>
                <button type="submit"
                    class="py-1 px-2 border rounded-md cursor-pointer flex-none text-yellow-400 opacity-80 hover:opacity-100"
                    title="add task">
                    ENTER
                </button>
            </div>
        </form>
        <div class="overflow-x-auto">
            <table class=" min-w-full border-spacing-2 border border-gray-700 overflow-auto">
                <thead class="ltr:text-left rtl:text-right">
                    <tr class="*:font-medium *:text-gray-400">
                        <th class="border border-gray-700 py-2 px-3 w-10">#</th>
                        <th class="border border-gray-700 py-2 px-3 whitespace-nowrap">Tasks</th>
                        <th class="border border-gray-700 py-2 px-3 w-20">Actions</th>
                    </tr>
                </thead>
                <tbody id="task-table" class="group/item"></tbody>
            </table>
        </div>
    </main>
    <footer class="w-full text-gray-100 text-center py-4">
        <a class="px-4 font-mono text-sm flex flex-col items-center opacity-30 hover:opacity-100" target="_blank"
            href="https://github.com/MarkoEv">
            <i class="fa-brands fa-github text-2xl text-center"></i>
            @MarkoEv 
        </a>
    </footer>
    <script src="./js/app.js"></script>
    <!-- <script src="./js/theme.js"></script> -->
</body>
